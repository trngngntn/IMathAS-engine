# Production stack: code is baked into the image (Dockerfile, multi-stage) — no
# bind mount, no Composer, no dev dependencies. nginx serves the clean routes.
#
#   docker compose up -d --build
services:
  web:
    image: nginx:latest
    ports:
      - "8088:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
  php:
    build:
      context: ./
      dockerfile: Dockerfile
