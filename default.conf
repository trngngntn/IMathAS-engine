server {
    listen 80;
    root /var/www/html;

    # Clean, extensionless API routes mapped to their PHP handlers.
    location = /render {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/render.php;
    }
    location = /score {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/score.php;
    }

    # Never serve PHP source or expose .php URLs directly — the only entry
    # points are the clean routes above.
    location ~ \.php$ {
        return 404;
    }
}
